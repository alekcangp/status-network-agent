<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Network Notebook</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .terminal {
            flex: 1;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid #00ff00;
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 1.5rem;
            text-shadow: 0 0 10px #00ff00;
        }
        
        .header .subtitle {
            color: #888;
            font-size: 0.8rem;
            margin-top: 5px;
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 20px;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 5px;
        }
        
        .message.user {
            background: #1a1a00;
            border-left: 3px solid #ffff00;
        }
        
        .message.agent {
            background: #001a00;
            border-left: 3px solid #00ff00;
        }
        
        .message .label {
            font-size: 0.7rem;
            color: #888;
            margin-bottom: 5px;
        }
        
        .message .content {
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        .message .tx-hash {
            font-size: 0.7rem;
            color: #00ff00;
            margin-top: 5px;
            word-break: break-all;
        }
        
        .input-area {
            display: flex;
            gap: 10px;
            padding-top: 10px;
            border-top: 1px solid #333;
        }
        
        .input-area input {
            flex: 1;
            background: #111;
            border: 1px solid #333;
            color: #00ff00;
            padding: 12px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
        }
        
        .input-area input:focus {
            border-color: #00ff00;
        }
        
        .input-area button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 12px 24px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
        }
        
        .input-area button:hover {
            background: #00cc00;
        }
        
        .input-area button:disabled {
            background: #333;
            cursor: not-allowed;
        }
        
        .typing {
            color: #888;
            font-style: italic;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        
        .cursor {
            display: inline-block;
            width: 10px;
            height: 1em;
            background: #00ff00;
            animation: blink 1s infinite;
        }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="header">
            <h1>🤖 Status Network Notebook</h1>
            <div class="subtitle">AI Agent on Status Network Sepolia (Chain ID: 1660990954)</div>
        </div>
        
        <div class="messages" id="messages">
            <div class="message agent">
                <div class="label">Agent</div>
                <div class="content">Hi! I'm your AI notebook on Status Network.

Just chat with me to:
• Remember things → I'll store them on-chain (gasless!)
• Ask about your notes → I'll find relevant info

What would you like me to remember?</div>
            </div>
        </div>
        
        <div class="input-area">
            <input type="text" id="input" placeholder="Type your message..." autocomplete="off">
            <button id="send">Send</button>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');
        
        async function sendMessage() {
            const message = input.value.trim();
            if (!message) return;
            
            // Add user message
            addMessage('You', message, 'user');
            input.value = '';
            
            // Show typing indicator
            const typingMsg = addMessage('Agent', '<span class="typing">Thinking...</span>', 'agent');
            
            sendBtn.disabled = true;
            input.disabled = true;
            
            try {
                const response = await fetch('/api/agent', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                
                const data = await response.json();
                
                // Remove typing indicator
                typingMsg.remove();
                
                if (data.error) {
                    addMessage('Agent', 'Error: ' + data.error, 'agent');
                } else {
                    let content = data.response;
                    if (data.txHash) {
                        content += '\n\n<span class="tx-hash">TX: ' + data.txHash + '</span>';
                    }
                    addMessage('Agent', content, 'agent');
                }
                
            } catch (error) {
                typingMsg.remove();
                addMessage('Agent', 'Error: ' + error.message, 'agent');
            }
            
            sendBtn.disabled = false;
            input.disabled = false;
            input.focus();
            
            // Scroll to bottom
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function addMessage(label, content, type) {
            const div = document.createElement('div');
            div.className = 'message ' + type;
            div.innerHTML = '<div class="label">' + label + '</div><div class="content">' + content + '</div>';
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return div;
        }
        
        // Event listeners
        sendBtn.addEventListener('click', sendMessage);
        
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        input.focus();
    </script>
</body>
</html>
